name: Deploy JupyterLite Demo

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install JupyterLite
        run: |
          python -m pip install --upgrade pip
          # jupyterlab is required to index the contents flag properly
          pip install "jupyterlite-core>=0.7,<0.8" "jupyterlite-xeus>=4,<5" jupyterlab

      - name: Show package info
        run: |
          pip show jupyterlite-core
          pip show jupyterlite-xeus
          
      - name: Build JupyterLite Site
        run: |
          # The --environment flag forces the builder to use your root environment.yml
          jupyter lite build --contents . --output-dir _output

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_output

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4